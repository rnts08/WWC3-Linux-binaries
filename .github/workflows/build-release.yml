name: Build and Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Dockerfiles
        uses: actions/checkout@v4

      - name: Clone WWC3 source
        run: |
          git clone --depth 1 https://github.com/Waya-Wolf/WWC3.git wwc3-source

      - name: Prepare build context
        run: |
          cp Dockerfile.qt-static wwc3-source/

      - name: Build Linux binaries
        run: |
          docker build -f wwc3-source/Dockerfile.qt-static -t ww-qt-static wwc3-source/
          docker run --rm ww-qt-static cat /build/src/wayawolfcoind > wayawolfcoind
          docker run --rm ww-qt-static cat /build/Wayawolfcoin-qt > Wayawolfcoin-qt
          chmod +x wayawolfcoind Wayawolfcoin-qt
          mkdir -p linux
          mv wayawolfcoind Wayawolfcoin-qt linux/
          tar -czvf WWC3-linux-x64.tar.gz linux/

      - name: Upload Linux asset
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          gh release upload ${{ github.event.release.tag_name }} WWC3-linux-x64.tar.gz

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout Dockerfiles
        uses: actions/checkout@v4

      - name: Clone WWC3 source
        run: |
          git clone --depth 1 https://github.com/Waya-Wolf/WWC3.git C:\wwc3

      - name: Install MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: mingw64
          install: >-
            mingw-w64-x86_64-qt5
            mingw-w64-x86_64-boost
            mingw-w64-x86_64-openssl
            mingw-w64-x86_64-berkeley-db
            mingw-w64-x86_64-miniupnpc
            mingw-w64-x86_64-qrencode

      - name: Build Windows binaries
        shell: msys2 {0}
        run: |
          cd /c/wwc3
          mkdir -p src/obj/crypto
          cd src
          make -f makefile.unix USE_UPNP=1 STATIC=1
          cd ..
          qmake "RELEASE=1" wayawolfcoin.pro
          make
          mkdir -p ../windows
          cp src/wayawolfcoind.exe ../windows/ 2>/dev/null || cp src/wayawolfcoind ../windows/wayawolfcoind.exe
          cp Wayawolfcoin-qt.exe ../windows/ 2>/dev/null || cp Wayawolfcoin-qt ../windows/Wayawolfcoin-qt.exe

      - name: Create zip archive
        run: |
          Compress-Archive -Path "C:\wwc3\windows\*" -DestinationPath "WWC3-windows-x64.zip"

      - name: Upload Windows asset
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          gh release upload ${{ github.event.release.tag_name }} WWC3-windows-x64.zip

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout Dockerfiles
        uses: actions/checkout@v4

      - name: Clone WWC3 source
        run: |
          git clone --depth 1 https://github.com/Waya-Wolf/WWC3.git ~/wwc3

      - name: Install dependencies
        run: |
          brew install qt5 boost berkeley-db miniupnpc qrencode

      - name: Build macOS binaries
        run: |
          cd ~/wwc3
          mkdir -p src/obj/crypto
          cd src
          make -f makefile.unix USE_UPNP=1 STATIC=1
          cd ..
          export PATH="/usr/local/opt/qt/bin:$PATH"
          export PKG_CONFIG_PATH="/usr/local/opt/qt/lib/pkgconfig"
          qmake "RELEASE=1" wayawolfcoin.pro
          make
          mkdir -p ../macosx
          cp src/wayawolfcoind ../macosx/
          cp Wayawolfcoin-qt ../macosx/

      - name: Create tar.gz archive
        run: |
          tar -czvf WWC3-macosx-x64.tar.gz -C ~ wwc3/macosx

      - name: Upload macOS asset
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          gh release upload ${{ github.event.release.tag_name }} WWC3-macosx-x64.tar.gz
