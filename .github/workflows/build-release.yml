name: Build and Release

on:
  release:
    types: [published]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: WWC3-linux-x64.tar.gz
          - os: windows-latest
            artifact_name: WWC3-windows-x64.zip
          - os: macos-latest
            artifact_name: WWC3-macosx-x64.tar.gz

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout Dockerfiles
        uses: actions/checkout@v4

      - name: Clone WWC3 source
        run: |
          git clone --depth 1 https://github.com/Waya-Wolf/WWC3.git wwc3-source

      - name: Prepare build context
        run: |
          cp Dockerfile.qt-static wwc3-source/

      - name: Build Linux binaries
        if: matrix.os == 'ubuntu-latest'
        run: |
          docker build -f wwc3-source/Dockerfile.qt-static -t ww-qt-static wwc3-source/
          docker run --rm ww-qt-static cat /build/src/wayawolfcoind > wayawolfcoind
          docker run --rm ww-qt-static cat /build/Wayawolfcoin-qt > Wayawolfcoin-qt
          chmod +x wayawolfcoind Wayawolfcoin-qt
          mkdir -p linux
          mv wayawolfcoind Wayawolfcoin-qt linux/
          tar -czvf ${{ matrix.artifact_name }} linux/

      - name: Build Windows binaries
        if: matrix.os == 'windows-latest'
        run: |
          choco install -y mingw msys2
          refreshenv
          cmd /c "C:\tools\msys64\msys2_shell.bat -defterm -here -no-hyper -mingw64 -shell bash -lc ""pacman -Syu --noconfirm && pacman -S --noconfirm mingw-w64-x86_64-qt5 mingw-w64-x86_64-boost mingw-w64-x86_64-openssl mingw-w64-x86_64-berkeley-db mingw-w64-x86_64-miniupnpc mingw-w64-x86_64-qrencode"""
          git clone --depth 1 https://github.com/Waya-Wolf/WWC3.git C:\wwc3
          cmd /c "C:\tools\msys64\msys2_shell.bat -defterm -here -no-hyper -mingw64 -shell bash -lc ""cd /c/wwc3 && mkdir -p src/obj/crypto && cd src && make -f makefile.unix USE_UPNP=1 STATIC=1 && cd .. && /c/Qt/5.15.2/mingw73_64/bin/qmake.exe RELEASE=1 wayawolfcoin.pro && make"""
          mkdir windows
          cp wwc3-source/src/wayawolfcoind.exe windows/ 2>/dev/null || cp wwc3-source/src/wayawolfcoind windows/wayawolfcoind.exe
          cp wwc3-source/Wayawolfcoin-qt.exe windows/ 2>/dev/null || cp wwc3-source/Wayawolfcoin-qt windows/Wayawolfcoin-qt.exe
          powershell -Command "Compress-Archive -Path 'windows\*' -DestinationPath '${{ matrix.artifact_name }}'"

      - name: Build macOS binaries
        if: matrix.os == 'macos-latest'
        run: |
          brew install qt5 boost berkeley-db miniupnpc qrencode
          cp -r wwc3-source/* .
          mkdir -p src/obj/crypto
          cd src && make -f makefile.unix USE_UPNP=1 STATIC=1
          cd ..
          export PATH="/usr/local/opt/qt/bin:$PATH"
          export PKG_CONFIG_PATH="/usr/local/opt/qt/lib/pkgconfig"
          qmake "RELEASE=1" wayawolfcoin.pro && make
          mkdir -p macosx
          cp src/wayawolfcoind macosx/
          cp Wayawolfcoin-qt macosx/
          tar -czvf ${{ matrix.artifact_name }} macosx/

      - name: Upload Release Asset
        run: |
          CONTENT_TYPE="${{ matrix.os == 'windows-latest' && 'zip' || 'gzip' }}"
          curl -s -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Content-Type: application/$CONTENT_TYPE" \
            --data-binary @${{ matrix.artifact_name }} \
            "${{ github.event.release.upload_url }}?name=${{ matrix.artifact_name }}"
