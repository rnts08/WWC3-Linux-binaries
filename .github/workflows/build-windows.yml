name: Build Windows

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          repository: Waya-Wolf/WWC3
          path: src

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: mingw64
          update: true
          install: >-
            mingw-w64-x86_64-qt5
            mingw-w64-x86_64-boost
            mingw-w64-x86_64-openssl
            mingw-w64-x86_64-miniupnpc
            mingw-w64-x86_64-qrencode
            mingw-w64-x86_64-db

      - name: Build daemon
        run: |
          $env:Path = "C:\tools\msys64\mingw64\bin;C:\tools\msys64\usr\bin;$env:Path"
          $env:MSYSTEM = "MINGW64"
          Set-Location "$env:GITHUB_WORKSPACE\src"
          New-Item -ItemType Directory -Force -Path obj\crypto
          mingw32-make -f makefile.unix USE_UPNP=1 -j2

      - name: Build Qt GUI
        run: |
          $env:Path = "C:\tools\msys64\mingw64\bin;C:\tools\msys64\usr\bin;$env:Path"
          $env:MSYSTEM = "MINGW64"
          Set-Location "$env:GITHUB_WORKSPACE"
          C:\tools\msys64\mingw64\bin\qmake.exe RELEASE=1 wayawolfcoin.pro
          mingw32-make -j2

      - name: Package
        run: |
          mkdir windows
          Get-ChildItem -Path $env:GITHUB_WORKSPACE\src -Filter "wayawolfcoind*" | Move-Item -Destination windows/
          Get-ChildItem -Path $env:GITHUB_WORKSPACE -Filter "Wayawolfcoin-qt*" | Move-Item -Destination windows/
          Compress-Archive -Path "windows\*" -DestinationPath "WWC3-windows-x64.zip"

      - name: Upload
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          gh release upload ${{ github.event.release.tag_name }} WWC3-windows-x64.zip
