name: Build Windows

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout Dockerfiles
        uses: actions/checkout@v4

      - name: Clone WWC3 source
        run: |
          git clone --depth 1 https://github.com/Waya-Wolf/WWC3.git wwc3-source

      - name: Prepare build context
        run: |
          cp Dockerfile.windows-cross wwc3-source/

      - name: Build Windows binaries
        run: |
          docker build -f wwc3-source/Dockerfile.windows-cross -t ww-qt-windows-cross wwc3-source/
          docker run --rm ww-qt-windows-cross cat /build/src/wayawolfcoind.exe > wayawolfcoind.exe
          docker run --rm ww-qt-windows-cross cat /build/Wayawolfcoin-qt.exe > Wayawolfcoin-qt.exe

      - name: Create zip archive
        run: |
          mkdir -p windows
          mv wayawolfcoind.exe Wayawolfcoin-qt.exe windows/
          powershell -Command "Compress-Archive -Path 'windows\*' -DestinationPath 'WWC3-windows-x64.zip'"

      - name: Upload
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          gh release upload ${{ github.event.release.tag_name }} WWC3-windows-x64.zip
